specification: API Commons Rate Limits
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/RateLimits
provider: Crossmint
providerId: crossmint
created: '2026-05-08'
modified: '2026-05-08'
reconciled: true
tags:
- Web3
- Wallets
- NFT
- Payments
- Checkout
- Rate Limiting
description: Crossmint enforces per-API-key rate limits on REST APIs.
notes: Specific RPS depends on environment and product; staging is more relaxed.
sources:
- https://docs.crossmint.com/
responseCodes:
  throttled: 429
limits:
- name: Default
  scope: api_key
  metric: requests_per_second
  limit: 10
  notes: Default REST API throughput; varies per product.
policies:
- name: Backoff Strategy
  description: Exponential backoff on 429.
maintainers:
- FN: Kin Lane
  email: kin@apievangelist.com
